services:
  postgres:
    image: postgres:16-alpine
    container_name: ollama-chat-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:0.5.7
    container_name: ollama-chat-chroma
    restart: unless-stopped
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=false

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ollama-chat-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    ports:
      - "127.0.0.1:8010:8000"
    volumes:
      - uploads_data:/app/uploads
    extra_hosts:
      - "tamarin.unchk.sn:host-gateway"
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /chat/api
    container_name: ollama-chat-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3010:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  chroma_data:
  uploads_data:
